worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr notice;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  access_log /dev/stdout;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; frame-ancestors 'self'; form-action 'self';" always;

    # Auth frontend SPA routing
    # Note: /auth path matches the BASE_PATH build arg in Dockerfile.
    # If BASE_PATH changes, update these locations accordingly.
    location /auth/assets {
      try_files $uri =404;
    }

    location /auth {
      try_files $uri $uri/ /auth/index.html =404;
    }

    location = /health {
      access_log off;
      default_type text/plain;
      return 200 'ok';
    }
  }
}
